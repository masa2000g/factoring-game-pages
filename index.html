<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>因数分解マスター - ペアファインダー</title>

  <!-- OGP -->
  <meta property="og:title" content="因数分解マスター">
  <meta property="og:description" content="パズルで因数分解を体感しよう！かけ算とたし算が合うペアを見つけて因数分解。中学生向けの操作型パズルゲーム。">
  <meta property="og:type" content="website">
  <meta name="description" content="かけ算とたし算が合うペアを見つけて因数分解！タップだけで遊べる中学生向けパズルゲーム。">

  <style>
    :root {
      --primary: #6c5ce7;
      --primary-light: #a29bfe;
      --primary-dark: #5b4cdb;
      --success: #00b894;
      --success-light: #e6fff2;
      --danger: #e17055;
      --danger-light: #ffe8e4;
      --warning: #fdcb6e;
      --bg: #f0f0f7;
      --card: #ffffff;
      --text: #2d3436;
      --text-light: #636e72;
      --shadow: 0 4px 20px rgba(108, 92, 231, 0.10);
      --radius: 16px;
      --radius-sm: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 0 12px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* === Header + Rule (compact) === */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0 4px;
      flex-shrink: 0;
    }

    .top-bar h1 {
      font-size: 1rem;
      color: var(--primary);
    }

    .stats {
      display: flex;
      gap: 12px;
      font-size: 0.75rem;
      color: var(--text-light);
    }

    .stats .val {
      font-weight: 700;
      color: var(--primary);
    }

    .stats .streak .val {
      color: var(--danger);
    }

    .rule-bar {
      background: var(--primary);
      color: #fff;
      text-align: center;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 0.72rem;
      font-weight: 600;
      flex-shrink: 0;
      line-height: 1.4;
    }

    /* === Game area (fills remaining space) === */
    .game {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 6px;
      min-height: 0;
      padding: 4px 0;
    }

    /* Expression */
    .expression {
      font-size: 1.5rem;
      font-weight: 800;
      text-align: center;
      color: var(--text);
      line-height: 1.2;
    }

    /* Targets */
    .targets {
      display: flex;
      justify-content: center;
      gap: 12px;
    }

    .target-badge {
      padding: 4px 14px;
      background: var(--card);
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--primary);
      box-shadow: var(--shadow);
    }

    /* Status / calc display */
    .status {
      text-align: center;
      padding: 6px;
      background: var(--card);
      border-radius: var(--radius-sm);
      font-size: 0.82rem;
      min-height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      box-shadow: var(--shadow);
    }

    .pair-calc { font-weight: 700; }
    .pair-calc.match { color: var(--success); }
    .pair-calc.no-match { color: var(--danger); }

    /* Number grid */
    .number-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      max-width: 300px;
      margin: 0 auto;
      width: 100%;
    }

    .num-btn {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.15rem;
      font-weight: 700;
      border: 2px solid #e0e0e0;
      border-radius: 50%;
      background: var(--card);
      color: var(--text);
      cursor: pointer;
      transition: all 0.15s;
      position: relative;
    }

    .num-btn:active { transform: scale(0.95); }

    .num-btn.selected {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      transform: scale(1.1);
      box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
    }

    .num-btn.correct-anim {
      background: var(--success);
      color: #fff;
      border-color: var(--success);
      animation: popIn 0.4s ease;
    }

    .num-btn.wrong-anim {
      background: var(--danger);
      color: #fff;
      border-color: var(--danger);
      animation: shake 0.5s ease;
    }

    .num-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    /* Duplicate badge */
    .num-btn .dup-badge {
      position: absolute;
      top: -3px;
      right: -3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--warning);
      color: var(--text);
      font-size: 0.5rem;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    /* Feedback */
    .feedback {
      text-align: center;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.5;
      min-height: 24px;
    }

    .feedback:empty { display: none; }

    .feedback.correct {
      background: var(--success-light);
      color: #00875a;
    }

    .feedback.wrong {
      background: var(--danger-light);
      color: #c0392b;
    }

    /* Result (factored form) */
    .result {
      text-align: center;
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--success);
      animation: popIn 0.4s ease;
    }

    .result:empty { display: none; }

    /* Buttons */
    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-shrink: 0;
      padding-bottom: max(8px, env(safe-area-inset-bottom));
    }

    .btn {
      padding: 12px 28px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: var(--primary-dark); }

    .btn-secondary {
      background: #e8e8f0;
      color: var(--text);
    }
    .btn-secondary:hover { background: #d0d0dd; }

    /* === Animations === */
    @keyframes popIn {
      0% { transform: scale(0.6); opacity: 0; }
      60% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-5px); }
      80% { transform: translateX(5px); }
    }

    @keyframes pulse-hint {
      0%, 100% { box-shadow: 0 0 0 0 rgba(108, 92, 231, 0.4); }
      50% { box-shadow: 0 0 0 8px rgba(108, 92, 231, 0); }
    }

    .hint-pulse { animation: pulse-hint 1.5s ease-in-out infinite; }

    /* === Confetti === */
    .confetti-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 1000;
    }

    .confetti-piece {
      position: absolute;
      width: 10px; height: 10px;
      border-radius: 2px;
      animation: confettiFall 1.2s ease-out forwards;
    }

    @keyframes confettiFall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg) scale(0.3); opacity: 0; }
    }

    .streak-popup {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-size: 2rem;
      font-weight: 900;
      color: var(--danger);
      text-shadow: 0 2px 8px rgba(0,0,0,0.1);
      pointer-events: none;
      z-index: 999;
      animation: streakPop 1s ease forwards;
    }

    @keyframes streakPop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      30% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
      60% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -60%) scale(0.8); opacity: 0; }
    }

    /* === Tutorial overlay === */
    .tutorial-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.6);
      z-index: 2000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .tutorial-card {
      background: #fff;
      border-radius: 20px;
      padding: 24px 20px;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.2);
    }

    .tutorial-card h3 {
      font-size: 1.1rem;
      color: var(--primary);
      margin-bottom: 10px;
    }

    .tutorial-card p {
      font-size: 0.88rem;
      color: var(--text);
      line-height: 1.6;
      margin-bottom: 16px;
    }

    .tutorial-card .demo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      background: var(--bg);
      border-radius: var(--radius-sm);
      margin-bottom: 16px;
      font-weight: 700;
    }

    .tutorial-card .demo .bubble {
      width: 44px; height: 44px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1.1rem;
      border: 2px solid #e0e0e0;
      background: #fff;
      transition: all 0.3s;
    }

    .tutorial-card .demo .bubble.sel {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      transform: scale(1.1);
    }

    .tutorial-card .demo .arrow { font-size: 1.3rem; color: var(--primary); }

    .tutorial-btn-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .tutorial-btn {
      padding: 12px 28px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .tutorial-btn-primary { background: var(--primary); color: #fff; }
    .tutorial-btn-skip { background: transparent; color: var(--text-light); }

    /* === Perfect square badge === */
    .perfect-square-badge {
      display: inline-block;
      background: linear-gradient(135deg, #fdcb6e, #e17055);
      color: #fff;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 700;
      animation: popIn 0.5s ease;
    }

    /* === Tap hand === */
    .tap-hand {
      position: absolute;
      font-size: 1.4rem;
      pointer-events: none;
      z-index: 100;
      bottom: -8px; right: -8px;
      animation: tapBounce 1.2s ease-in-out infinite;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    @keyframes tapBounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-6px) scale(1.1); }
    }

    .hidden { display: none !important; }

    /* === Responsive === */
    @media (max-width: 380px) {
      .expression { font-size: 1.25rem; }
      .num-btn { font-size: 1rem; }
      .number-grid { gap: 5px; max-width: 260px; }
      .container { padding: 0 8px; }
    }

    @media (min-height: 700px) {
      .game { gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="top-bar">
      <h1>因数分解マスター</h1>
      <div class="stats">
        <span><span class="val" id="correct-count">0</span>/<span id="total-count">0</span></span>
        <span class="streak"><span class="val" id="streak-count">0</span>連続</span>
      </div>
    </div>

    <!-- Rule -->
    <div class="rule-bar">
      「かけて c、たして b」になる2つの数をタップ → (x+?)(x+?) を完成させよう
    </div>

    <!-- Game -->
    <div class="game">
      <div class="expression" id="expr"></div>
      <div class="targets">
        <div class="target-badge" id="target-product">かけて ?</div>
        <div class="target-badge" id="target-sum">たして ?</div>
      </div>
      <div class="status" id="status">数字を2つタップしよう</div>
      <div class="number-grid" id="grid"></div>
      <div class="feedback" id="feedback"></div>
      <div class="result" id="result"></div>
    </div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn btn-secondary" id="reset-btn">選び直す</button>
      <button class="btn btn-primary hidden" id="next-btn">次の問題 →</button>
    </div>
  </div>

  <div class="confetti-container" id="confetti"></div>

<script>
// ========== Utilities ==========
const $ = id => document.getElementById(id);
const randInt = (a, b) => a + Math.floor(Math.random() * (b - a + 1));
const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const shuffle = arr => {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
};

function formatTerm(coef, varPart) {
  if (coef === 0) return '';
  if (!varPart) return String(coef);
  if (coef === 1) return varPart;
  if (coef === -1) return '-' + varPart;
  return coef + varPart;
}

function formatPoly(a, b, c) {
  const parts = [];
  if (a !== 0) parts.push(formatTerm(a, 'x\u00B2'));
  if (b !== 0) {
    const t = formatTerm(Math.abs(b), 'x');
    if (parts.length > 0) parts.push(b > 0 ? ' + ' + t : ' \u2212 ' + t);
    else parts.push(formatTerm(b, 'x'));
  }
  if (c !== 0) {
    if (parts.length > 0) parts.push(c > 0 ? ' + ' + c : ' \u2212 ' + Math.abs(c));
    else parts.push(String(c));
  }
  return parts.join('') || '0';
}

function formatFactor(a, b) {
  let s = '';
  if (a === 1) s = 'x';
  else if (a === -1) s = '-x';
  else s = a + 'x';
  if (b > 0) s += '+' + b;
  else if (b < 0) s += '\u2212' + Math.abs(b);
  return '(' + s + ')';
}

function formatFactorInner(val) {
  if (val >= 0) return 'x+' + val;
  return 'x\u2212' + Math.abs(val);
}

// ========== Tutorial ==========
const TUTORIAL_KEY = 'factoring-master-tutorial-done';

function isTutorialDone() {
  return localStorage.getItem(TUTORIAL_KEY) === 'true';
}

function showTutorial() {
  const overlay = document.createElement('div');
  overlay.className = 'tutorial-overlay';
  overlay.innerHTML = `
    <div class="tutorial-card">
      <h3>ペアファインダー</h3>
      <p>
        <b>x² + 5x + 6</b> を因数分解しよう！<br>
        「<b>かけて 6</b>、<b>たして 5</b>」になるペアは？<br>
        → <b>2</b> と <b>3</b> をタップ！ → <b>(x+2)(x+3)</b>
      </p>
      <div class="demo">
        <div class="bubble" id="td-b1">2</div>
        <div class="bubble" id="td-b2">3</div>
        <span class="arrow">→</span>
        <span style="font-size:0.85rem;color:var(--success);font-weight:700">(x+2)(x+3)</span>
      </div>
      <div class="tutorial-btn-row">
        <button class="tutorial-btn tutorial-btn-skip" id="tutorial-skip">スキップ</button>
        <button class="tutorial-btn tutorial-btn-primary" id="tutorial-start">はじめる！</button>
      </div>
    </div>`;

  document.body.appendChild(overlay);

  setTimeout(() => {
    const b1 = document.getElementById('td-b1');
    const b2 = document.getElementById('td-b2');
    if (b1) b1.classList.add('sel');
    setTimeout(() => { if (b2) b2.classList.add('sel'); }, 400);
  }, 500);

  const close = () => {
    overlay.remove();
    localStorage.setItem(TUTORIAL_KEY, 'true');
  };

  document.getElementById('tutorial-start').addEventListener('click', close);
  document.getElementById('tutorial-skip').addEventListener('click', close);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });
}

// ========== Hints ==========
let hintTimers = [];

function clearHints() {
  hintTimers.forEach(t => clearTimeout(t));
  hintTimers = [];
  document.querySelectorAll('.hint-pulse').forEach(el => el.classList.remove('hint-pulse'));
  document.querySelectorAll('.tap-hand').forEach(el => el.remove());
}

function addTapHand(el) {
  if (!el) return;
  const hand = document.createElement('div');
  hand.className = 'tap-hand';
  hand.textContent = '\uD83D\uDC46';
  el.style.position = 'relative';
  el.appendChild(hand);
}

// ========== Celebrations ==========
function showConfetti() {
  const container = $('confetti');
  const colors = ['#6c5ce7', '#a29bfe', '#00b894', '#fdcb6e', '#e17055', '#fd79a8', '#74b9ff'];
  for (let i = 0; i < 40; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + '%';
    piece.style.top = '-10px';
    piece.style.background = pick(colors);
    piece.style.animationDelay = Math.random() * 0.3 + 's';
    piece.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
    piece.style.width = (6 + Math.random() * 8) + 'px';
    piece.style.height = (6 + Math.random() * 8) + 'px';
    if (Math.random() > 0.5) piece.style.borderRadius = '50%';
    container.appendChild(piece);
  }
  setTimeout(() => { container.innerHTML = ''; }, 2000);
}

function showStreakPopup() {
  if (state.streak < 3) return;
  const popup = document.createElement('div');
  popup.className = 'streak-popup';
  popup.textContent = `\uD83D\uDD25 ${state.streak}\u9023\u7D9A\uFF01`;
  document.body.appendChild(popup);
  setTimeout(() => popup.remove(), 1200);
}

// ========== Game State ==========
const state = {
  correct: 0,
  total: 0,
  streak: 0,
  isFirst: true,
  p: 0, q: 0, b: 0, c: 0,
  selected: [],
  solved: false,
  isSamePair: false,
  tutorialStep: 0,
  tutorialLocked: false
};

function updateStats() {
  $('correct-count').textContent = state.correct;
  $('total-count').textContent = state.total;
  $('streak-count').textContent = state.streak;
}

// ========== New Problem ==========
function newProblem() {
  clearHints();

  let p, q;
  if (state.isFirst) {
    p = 2; q = 3;
  } else {
    const allowSame = Math.random() < 0.2;
    do {
      p = randInt(-9, 9);
      q = allowSame ? p : randInt(-9, 9);
    } while (p === 0 || q === 0 || p * q === 0 || Math.abs(p * q) > 30);
  }

  const b = p + q;
  const c = p * q;
  const isSamePair = p === q;

  Object.assign(state, { p, q, b, c, selected: [], solved: false, isSamePair });

  $('expr').textContent = formatPoly(1, b, c);
  $('target-product').textContent = '\u304B\u3051\u3066 ' + c;
  $('target-sum').textContent = '\u305F\u3057\u3066 ' + b;
  $('status').innerHTML = '\u6570\u5B57\u30922\u3064\u30BF\u30C3\u30D7\u3057\u3088\u3046';
  $('result').textContent = '';
  $('feedback').textContent = '';
  $('feedback').className = 'feedback';
  $('next-btn').classList.add('hidden');
  $('reset-btn').classList.remove('hidden');

  buildGrid(p, q, isSamePair);

  // First problem: guided tutorial steps
  if (state.isFirst) {
    state.tutorialStep = 1;
    state.tutorialLocked = true;
    showGuidedStep1();
  } else {
    state.tutorialStep = 0;
    state.tutorialLocked = false;
  }
}

function buildGrid(p, q, isSamePair) {
  const numList = isSamePair ? [p, p] : [p, q];

  const distractors = [];
  for (let i = -9; i <= 9; i++) {
    if (i !== 0 && i !== p && i !== q) distractors.push(i);
  }
  const shuffled = shuffle(distractors);
  for (const d of shuffled) {
    if (numList.length >= 15) break;
    numList.push(d);
  }
  while (numList.length < 15) numList.push(randInt(1, 9));

  const finalNums = shuffle(numList.slice(0, 15));
  const grid = $('grid');
  grid.innerHTML = '';

  finalNums.forEach((n, i) => {
    const btn = document.createElement('button');
    btn.className = 'num-btn';
    btn.textContent = n;
    btn.dataset.value = n;
    btn.dataset.uid = i;
    btn.addEventListener('click', () => selectNumber(n, btn));
    grid.appendChild(btn);
  });

  if (isSamePair) {
    let dupCount = 0;
    grid.querySelectorAll('.num-btn').forEach(btn => {
      if (parseInt(btn.dataset.value) === p) {
        dupCount++;
        if (dupCount <= 2) {
          const badge = document.createElement('span');
          badge.className = 'dup-badge';
          badge.textContent = dupCount === 1 ? 'A' : 'B';
          btn.appendChild(badge);
        }
      }
    });
  }
}

// ========== Guided Tutorial (1st problem) ==========
function showGuidedStep1() {
  const { b, c } = state;
  $('feedback').className = 'feedback correct';
  $('feedback').innerHTML =
    `<b>Step 1</b>\uFF1A\u300C\u304B\u3051\u3066 ${c}\u3001\u305F\u3057\u3066 ${b}\u300D\u306B\u306A\u308B2\u3064\u306E\u6570\u3092\u898B\u3064\u3051\u3088\u3046\uFF01` +
    `<br><button style="margin-top:4px;padding:4px 16px;border:none;border-radius:6px;background:#fff;color:var(--primary);font-weight:700;cursor:pointer" id="tut-next1">\u308F\u304B\u3063\u305F\uFF01 \u2192</button>`;
  document.getElementById('tut-next1').addEventListener('click', showGuidedStep2);
}

function showGuidedStep2() {
  const { b, c, p, q } = state;
  $('feedback').innerHTML =
    `<b>Step 2</b>\uFF1A${c} = ${p}\u00D7${q}\u3001${p}+${q} = ${b} \u2192 <b>${p}</b> \u3068 <b>${q}</b> \u304C\u7B54\u3048\uFF01` +
    `<br>\u4E0B\u306E\u30DC\u30BF\u30F3\u304B\u3089\u30BF\u30C3\u30D7\u3057\u3066\u307F\u3088\u3046` +
    `<br><button style="margin-top:4px;padding:4px 16px;border:none;border-radius:6px;background:#fff;color:var(--primary);font-weight:700;cursor:pointer" id="tut-next2">\u30BF\u30C3\u30D7\u3059\u308B\uFF01</button>`;
  document.getElementById('tut-next2').addEventListener('click', () => {
    state.tutorialStep = 3;
    state.tutorialLocked = false;
    $('feedback').className = 'feedback correct';
    $('feedback').innerHTML = `\u5149\u3063\u3066\u3044\u308B <b>${p}</b> \u3068 <b>${q}</b> \u3092\u30BF\u30C3\u30D7\uFF01`;

    // Highlight answer buttons
    const buttons = $('grid').querySelectorAll('.num-btn');
    const found = [];
    buttons.forEach(btn => {
      const val = parseInt(btn.dataset.value);
      if (val === p && !found.includes('p')) { addTapHand(btn); btn.classList.add('hint-pulse'); found.push('p'); }
      else if (val === q && !found.includes('q')) { addTapHand(btn); btn.classList.add('hint-pulse'); found.push('q'); }
    });
  });
}

// ========== Selection ==========
function selectNumber(n, btn) {
  if (state.solved || state.tutorialLocked) return;
  clearHints();

  if (btn.classList.contains('selected')) {
    btn.classList.remove('selected');
    state.selected = state.selected.filter(s => s.btn !== btn);
    updateStatus();
    return;
  }

  if (state.selected.length >= 2) return;

  btn.classList.add('selected');
  state.selected.push({ value: n, btn });

  if (state.selected.length === 2) {
    checkAnswer();
  } else {
    updateStatus();
  }
}

function updateStatus() {
  if (state.selected.length === 0) {
    $('status').innerHTML = '\u6570\u5B57\u30922\u3064\u30BF\u30C3\u30D7\u3057\u3088\u3046';
  } else if (state.selected.length === 1) {
    $('status').innerHTML = `<strong>${state.selected[0].value}</strong> \u3092\u9078\u629E\u4E2D\u2026 \u3082\u30461\u3064\u30BF\u30C3\u30D7\uFF01`;
  }
}

function checkAnswer() {
  const { b, c, selected, p, q, isSamePair } = state;
  const v1 = selected[0].value;
  const v2 = selected[1].value;
  const product = v1 * v2;
  const sum = v1 + v2;
  const productOk = product === c;
  const sumOk = sum === b;

  $('status').innerHTML =
    `<span class="pair-calc ${productOk ? 'match' : 'no-match'}">${v1} \u00D7 ${v2} = ${product}</span>` +
    `<span class="pair-calc ${sumOk ? 'match' : 'no-match'}">${v1} + ${v2} = ${sum}</span>`;

  if (productOk && sumOk) {
    state.solved = true;
    state.correct++;
    state.total++;
    state.streak++;
    state.isFirst = false;
    state.tutorialStep = 0;
    updateStats();

    selected.forEach(s => {
      s.btn.classList.remove('selected');
      s.btn.classList.add('correct-anim');
    });
    document.querySelectorAll('.num-btn').forEach(b => {
      if (!b.classList.contains('correct-anim')) b.classList.add('disabled');
    });

    if (isSamePair) {
      $('result').innerHTML = formatFactor(1, p) + '\u00B2 <span class="perfect-square-badge">\u2728 \u5B8C\u5168\u5E73\u65B9\u5F0F\uFF01</span>';
    } else {
      $('result').textContent = formatFactor(1, p) + formatFactor(1, q);
    }

    $('feedback').className = 'feedback correct';
    $('feedback').innerHTML = isSamePair
      ? '\uD83C\uDF89 \u6B63\u89E3\uFF01 \u540C\u3058\u6570\u306E\u30DA\u30A2 \u2192 \u5B8C\u5168\u5E73\u65B9\u5F0F\uFF01'
      : '\uD83C\uDF89 \u6B63\u89E3\uFF01 \u30DA\u30A2\u3092\u898B\u3064\u3051\u305F\uFF01';

    $('next-btn').classList.remove('hidden');
    $('reset-btn').classList.add('hidden');
    setTimeout(() => $('next-btn').classList.add('hint-pulse'), 600);

    showConfetti();
    if (isSamePair) setTimeout(() => showConfetti(), 400);
    showStreakPopup();
  } else {
    state.total++;
    state.streak = 0;
    updateStats();

    selected.forEach(s => s.btn.classList.add('wrong-anim'));

    let reason = '';
    if (!productOk && !sumOk) {
      reason = `\u2716 ${v1}\u00D7${v2}=${product}(\u76EE\u6A19${c}) \u2716 ${v1}+${v2}=${sum}(\u76EE\u6A19${b})<br>\uD83D\uDCA1 \u307E\u305A\u300C\u304B\u3051\u3066${c}\u300D\u306B\u306A\u308B\u30DA\u30A2\u3092\u63A2\u305D\u3046`;
    } else if (!productOk) {
      reason = `\u2714 \u305F\u3057\u7B97OK\uFF01 \u2716 \u304B\u3051\u7B97: ${v1}\u00D7${v2}=${product}(\u76EE\u6A19${c})<br>\uD83D\uDCA1 \u304B\u3051\u3066${c}\u306B\u306A\u308B\u7D44\u307F\u5408\u308F\u305B\u306F\uFF1F`;
    } else {
      const diff = Math.abs(sum - b);
      let hint = `\uD83D\uDCA1 ${c}\u306E\u7D04\u6570\u3067\u3001\u305F\u3057\u3066${b}\u306B\u306A\u308B\u30DA\u30A2\u306F\uFF1F`;
      if (isSamePair) hint = `\uD83D\uDCA1 \u540C\u3058\u6570\u30922\u56DE\u4F7F\u3048\u308B\u3088\uFF01 ${p}\u00D7${p}=${c}, ${p}+${p}=${b}`;
      reason = `\u2714 \u304B\u3051\u7B97OK\uFF01 \u2716 \u305F\u3057\u7B97: ${v1}+${v2}=${sum}(\u76EE\u6A19${b}\u3001${diff}\u305A\u308C)<br>${hint}`;
    }

    $('feedback').className = 'feedback wrong';
    $('feedback').innerHTML = reason;

    setTimeout(() => {
      selected.forEach(s => s.btn.classList.remove('selected', 'wrong-anim'));
      state.selected = [];
    }, 800);
  }
}

// ========== Buttons ==========
$('reset-btn').addEventListener('click', () => {
  if (state.solved) return;
  state.selected.forEach(s => s.btn.classList.remove('selected'));
  state.selected = [];
  $('status').innerHTML = '\u6570\u5B57\u30922\u3064\u30BF\u30C3\u30D7\u3057\u3088\u3046';
  if (state.tutorialStep === 0) {
    $('feedback').className = 'feedback';
    $('feedback').textContent = '';
  }
});

$('next-btn').addEventListener('click', () => {
  $('next-btn').classList.remove('hint-pulse');
  newProblem();
});

// ========== Init ==========
if (!isTutorialDone()) showTutorial();
newProblem();
</script>
</body>
</html>
